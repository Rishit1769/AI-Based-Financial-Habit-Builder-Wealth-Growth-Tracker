name: financial_habit_builder
description: Financial Habit Builder & Wealth Growth Tracker - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Shared preferences
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Typography
  google_fonts: ^6.2.1

  # Internationalization / date formatting
  intl: ^0.19.0

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # App icon
  cupertino_icons: ^1.0.6

  # File sharing (CSV export)
  share_plus: ^9.0.0

  # File path utilities
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
